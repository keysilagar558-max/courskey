
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sílabos 2026 · Keysi</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --series:    #6C5CE7;
    --regresion: #00B894;
    --modelos:   #E17055;
    --gestion:   #FDCB6E;
    --redes:     #0984E3;
    --machine:   #A29BFE;
    --bg: #0F0F1A;
    --card: #16162A;
    --border: rgba(255,255,255,0.07);
    --text: #F0EEFF;
    --muted: rgba(240,238,255,0.45);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HERO */
  .hero {
    text-align: center;
    padding: 4rem 1.5rem 3rem;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(108,92,231,0.18) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--series);
    border: 1px solid rgba(108,92,231,0.4);
    border-radius: 20px;
    padding: 4px 14px;
    margin-bottom: 1.2rem;
  }
  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 6vw, 3.5rem);
    line-height: 1.15;
    margin-bottom: 0.75rem;
  }
  .hero h1 span { color: var(--series); }
  .hero p {
    font-size: 15px;
    color: var(--muted);
    max-width: 480px;
    margin: 0 auto 2rem;
    line-height: 1.7;
  }
  .hero-meta {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    flex-wrap: wrap;
  }
  .meta-chip {
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .meta-chip svg { width: 14px; height: 14px; opacity: 0.6; }

  /* GRID */
  .grid-section { padding: 0 1.25rem 1.5rem; max-width: 1100px; margin: 0 auto; }
  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
    padding-left: 2px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
    gap: 14px;
  }

  /* CARD */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    position: relative;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
  }
  .card-top {
    padding: 1.25rem 1.25rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .card-icon {
    width: 46px; height: 46px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .card-info { flex: 1; min-width: 0; }
  .card-code {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 3px;
  }
  .card-title {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.3;
    color: var(--text);
  }
  .card-docente {
    font-size: 12px;
    color: var(--muted);
    margin-top: 5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-body { padding: 1rem 1.25rem; }
  .card-sumilla {
    font-size: 12.5px;
    color: var(--muted);
    line-height: 1.65;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 1rem;
  }
  .card-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
  .pill {
    font-size: 10px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 20px;
  }
  .card-actions { display: flex; gap: 8px; }
  .btn {
    flex: 1;
    padding: 8px 0;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    text-align: center;
    text-decoration: none;
    display: flex; align-items: center; justify-content: center; gap: 5px;
  }
  .btn:hover { opacity: 0.85; transform: scale(0.98); }
  .btn-primary { color: #fff; }
  .btn-ghost {
    background: rgba(255,255,255,0.06);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  /* MODAL */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(6px);
    z-index: 100;
    padding: 1rem;
    overflow-y: auto;
  }
  .overlay.open { display: flex; align-items: flex-start; justify-content: center; padding-top: 2rem; }
  .modal {
    background: #1A1A2E;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    width: 100%;
    max-width: 720px;
    overflow: hidden;
    margin-bottom: 2rem;
  }
  .modal-header {
    padding: 1.5rem 1.5rem 1.25rem;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    display: flex; align-items: flex-start; gap: 14px;
  }
  .modal-icon {
    width: 56px; height: 56px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    flex-shrink: 0;
  }
  .modal-info { flex: 1; }
  .modal-code { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 22px; margin: 4px 0 6px; }
  .modal-docente { font-size: 13px; color: var(--muted); }
  .close-btn {
    background: rgba(255,255,255,0.07);
    border: none; color: var(--muted);
    width: 34px; height: 34px;
    border-radius: 50%;
    cursor: pointer; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .close-btn:hover { background: rgba(255,255,255,0.14); }
  .modal-body { padding: 1.5rem; }
  .modal-section { margin-bottom: 1.5rem; }
  .modal-section h3 {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .modal-section p, .modal-section li {
    font-size: 13.5px;
    color: rgba(240,238,255,0.8);
    line-height: 1.7;
  }
  .modal-section ul { padding-left: 1.2rem; }
  .unidad-card {
    border-radius: 10px;
    padding: 1rem;
    margin-bottom: 10px;
    border: 1px solid rgba(255,255,255,0.07);
  }
  .unidad-n { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
  .unidad-titulo { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
  .unidad-semanas { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .evidencias { display: flex; flex-direction: column; gap: 4px; }
  .ev-tag {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    display: inline-block;
    width: fit-content;
  }
  .info-row {
    display: flex;
    justify-content: space-between;
    padding: 7px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 13px;
  }
  .info-row:last-child { border-bottom: none; }
  .info-row span:first-child { color: var(--muted); }
  .modal-footer {
    padding: 1rem 1.5rem;
    border-top: 1px solid rgba(255,255,255,0.07);
    display: flex; gap: 10px;
  }
  .footer-btn {
    flex: 1; padding: 10px;
    border-radius: 10px;
    font-size: 13px; font-weight: 600;
    border: none; cursor: pointer;
    transition: opacity 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .footer-btn:hover { opacity: 0.85; }
  .footer-btn-ghost {
    background: rgba(255,255,255,0.06);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  /* ACCENT LINE */
  .card-accent { height: 3px; width: 100%; }

  /* FOOTER */
  .site-footer {
    text-align: center;
    padding: 2rem 1rem;
    font-size: 12px;
    color: var(--muted);
    border-top: 1px solid var(--border);
    margin-top: 2rem;
  }

  @media (max-width: 500px) {
    .hero { padding: 3rem 1rem 2rem; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>

function hexAlpha(hex, a) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

  modal.innerHTML = `
    <div class="modal-header">
      <div class="modal-icon" style="background:${hexAlpha(c.color,0.2)};font-size:28px">${c.icon}</div>
      <div class="modal-info">
        <div class="modal-code" style="color:${c.color}">${c.code}</div>
        <div class="modal-title">${c.nombre}</div>
        <div class="modal-docente">${c.docente}</div>
      </div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-section">
        <h3>Datos del curso</h3>
        <div class="info-row"><span>Créditos</span><span>${c.creditos}</span></div>
        <div class="info-row"><span>Horas semanales</span><span>${c.horas}</span></div>
        <div class="info-row"><span>Nivel</span><span>${c.nivel}</span></div>
        <div class="info-row"><span>Aula</span><span>${c.aula}</span></div>
        <div class="info-row"><span>Prerrequisito</span><span>${c.prerreq}</span></div>
        <div class="info-row"><span>Duración</span><span>${c.duracion}</span></div>
        <div class="info-row"><span>Modalidad</span><span>${c.modalidad}</span></div>
      </div>
      <div class="modal-section">
        <h3>Sumilla</h3>
        <p>${c.sumilla}</p>
      </div>
      <div class="modal-section">
        <h3>Logro del curso</h3>
        <p>${c.logro}</p>
      </div>
      <div class="modal-section">
        <h3>Unidades didácticas</h3>
        ${unidadesHTML}
      </div>
      <div class="modal-section">
        <h3>Calificación</h3>
        <p>${c.calificacion}</p>
      </div>
      <div class="modal-section">
        <h3>Bibliografía básica</h3>
        <ul>${c.biblio.map(b=>`<li>${b}</li>`).join('')}</ul>
      </div>
    </div>
    <div class="modal-footer">
      <button class="footer-btn" style="background:${c.color};color:#fff" onclick="descargar(${i})">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Descargar sílabo
      </button>
      <button class="footer-btn footer-btn-ghost" onclick="closeModal()">Cerrar</button>
    </div>
  `;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('overlay')) {
    document.getElementById('overlay').classList.remove('open');
    document.body.style.overflow = '';
  }
}

function descargar(i) {
  const c = CURSOS[i];
  const contenido = `SÍLABO ${c.code} — ${c.nombre.toUpperCase()}
${'='.repeat(60)}
Docente: ${c.docente}
Créditos: ${c.creditos} | Horas: ${c.horas} | Nivel: ${c.nivel}
Aula: ${c.aula}
Duración: ${c.duracion}
Prerrequisito: ${c.prerreq}

SUMILLA
${c.sumilla}

LOGRO DEL CURSO
${c.logro}

UNIDADES DIDÁCTICAS
${c.unidades.map(u=>`
Unidad ${u.n}: ${u.titulo} (${u.semanas})
${u.evidencias.map(e=>'  • '+e).join('\n')}`).join('\n')}

CALIFICACIÓN
${c.calificacion}

BIBLIOGRAFÍA BÁSICA
${c.biblio.map(b=>'• '+b).join('\n')}

---
UNA Puno · Ingeniería Estadística e Informática · 2026-I
`;
  const blob = new Blob([contenido], {type:'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `silabo_${c.code}.txt`;
  a.click();
}
</script>
</body>
